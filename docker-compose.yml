version: "3.9"

services:
  word-drift:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - wd_data:/data
      - ./ontology:/app/ontology:ro
      - ./examples:/app/examples:ro
      - ./data:/app/data:ro
      - ./site:/app/site:ro
    environment:
      PORT: "8080"
      WORD_DRIFT_STORE: "/data/wd-store"
      TRAILS_ENV: "production"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # data loading takes ~10-30s

volumes:
  wd_data:
