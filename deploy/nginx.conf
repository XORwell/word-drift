# WORD-DRIFT nginx config -- hardened for public hosting.
# CSP + headers follow docs/security-review.md. script-src is strict 'self'
# because all inline scripts were externalised (assets/app.js, assets/theme.js).
server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    autoindex off;                 # no directory listing
    server_tokens off;             # do not advertise nginx version

    # --- correct MIME types for the RDF / data downloads ---
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        application/json                      json;
        application/ld+json                   jsonld;
        text/turtle                           ttl;
        application/n-triples                 nt;
        application/trig                      trig;
        image/svg+xml                         svg;
        font/woff2                            woff2;
        text/plain                            txt md;
    }
    default_type application/octet-stream;

    # --- security headers (applied to every response) ---
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://upload.wikimedia.org; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.wikidata.org https://*.wikipedia.org; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    # HSTS: enable only behind HTTPS (a TLS-terminating proxy). Harmless on http,
    # but uncomment when serving over HTTPS:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    gzip on;
    gzip_types text/css application/javascript application/json application/ld+json text/turtle application/n-triples image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ =404;
    }

    # long cache for the immutable vendored asset; short for data that changes
    location /assets/vendor/ { expires 30d; add_header Cache-Control "public, immutable"; }
    location ~* \.(ttl|nt|jsonld|json|csv|trig)$ { expires 1h; }
}
